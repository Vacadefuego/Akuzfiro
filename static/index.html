<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Akuzfiro</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#00d4ff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Akuzfiro">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Inter:wght@300;400;500&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #050508;
      --surface: #0c0c14;
      --surface2: #12121f;
      --border: #1a1a2e;
      --accent: #00d4ff;
      --accent2: #7000ff;
      --accent3: #00ff9d;
      --text: #d0d0e8;
      --text-dim: #4a4a6a;
      --link: #00d4ff;
      --user-bg: #0d0d1f;
      --ai-bg: #080f0c;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Fondo animado */
    body::before {
      content: '';
      position: fixed;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background:
        radial-gradient(ellipse at 20% 20%, rgba(0, 112, 255, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.03) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(112, 0, 255, 0.02) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* HEADER */
    header {
      position: relative;
      z-index: 10;
      padding: 0 28px;
      height: 60px;
      background: rgba(8, 8, 16, 0.95);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      backdrop-filter: blur(20px);
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent2), transparent);
      opacity: 0.4;
    }

    .logo-container {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon::before {
      content: '';
      position: absolute;
      width: 32px;
      height: 32px;
      border: 1.5px solid var(--accent);
      border-radius: 8px;
      transform: rotate(45deg);
      animation: rotateSlow 8s linear infinite;
      opacity: 0.6;
    }

    .logo-icon::after {
      content: '';
      position: absolute;
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--accent2);
      border-radius: 4px;
      transform: rotate(45deg);
      animation: rotateSlow 8s linear infinite reverse;
      opacity: 0.8;
    }

    @keyframes rotateSlow {
      from { transform: rotate(45deg); }
      to { transform: rotate(405deg); }
    }

    .logo-dot {
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      position: relative;
      z-index: 1;
      animation: glow 2s ease-in-out infinite;
    }

    @keyframes glow {
      0%, 100% { box-shadow: 0 0 6px var(--accent); }
      50% { box-shadow: 0 0 16px var(--accent), 0 0 30px var(--accent); }
    }

    .logo-text {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      letter-spacing: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: rgba(0, 255, 157, 0.05);
      border: 1px solid rgba(0, 255, 157, 0.15);
      border-radius: 20px;
      font-size: 0.7rem;
      font-weight: 500;
      color: var(--accent3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      background: var(--accent3);
      border-radius: 50%;
      box-shadow: 0 0 6px var(--accent3);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    /* CHAT */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 28px 24px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: relative;
      z-index: 1;
    }

    #chat::-webkit-scrollbar { width: 3px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb {
      background: linear-gradient(var(--accent), var(--accent2));
      border-radius: 3px;
    }

    /* BIENVENIDA */
    .bienvenida {
      margin: auto;
      text-align: center;
      padding: 40px;
    }

    .bienvenida-title {
      font-family: 'Rajdhani', sans-serif;
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: 8px;
      background: linear-gradient(135deg, var(--accent), var(--accent2), var(--accent3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 12px;
    }

    .bienvenida-sub {
      font-size: 0.8rem;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .bienvenida-line {
      width: 80px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
      margin: 16px auto;
    }

    /* MENSAJES */
    .mensaje-wrapper {
      display: flex;
      flex-direction: column;
      gap: 4px;
      animation: slideIn 0.3s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .mensaje-wrapper.usuario { align-items: flex-end; }
    .mensaje-wrapper.akuzfiro { align-items: flex-start; }

    .mensaje-label {
      font-size: 0.65rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 600;
      padding: 0 4px;
    }

    .mensaje-wrapper.usuario .mensaje-label { color: rgba(0, 212, 255, 0.5); }
    .mensaje-wrapper.akuzfiro .mensaje-label { color: rgba(0, 212, 255, 0.5); }

    .mensaje {
      max-width: 72%;
      padding: 14px 18px;
      font-size: 0.92rem;
      line-height: 1.7;
      position: relative;
      word-break: break-word;
    }

    .mensaje.usuario {
      background: var(--user-bg);
      border: 1px solid rgba(0, 212, 255, 0.15);
      border-radius: 16px 4px 16px 16px;
      color: #e8e8ff;
    }

    .mensaje.usuario::before {
      content: '';
      position: absolute;
      top: 0;
      right: 0;
      width: 40%;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0, 212, 255, 0.4));
    }

    .mensaje.akuzfiro {
      background: linear-gradient(135deg, rgba(0, 20, 14, 0.95), rgba(0, 10, 20, 0.95));
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-left: 2px solid var(--accent);
      border-radius: 4px 16px 16px 16px;
      color: #e8f4ff;
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.04), inset 0 0 30px rgba(0, 255, 157, 0.02);
    }

    .mensaje.akuzfiro::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 50%;
      height: 1px;
      background: linear-gradient(90deg, var(--accent), transparent);
      opacity: 0.6;
    }

    /* ENLACES */
    .mensaje a,
    .mensaje-text a {
      color: #00d4ff !important;
      text-decoration: none;
      border-bottom: 1px solid rgba(0, 212, 255, 0.3);
      transition: all 0.2s;
      word-break: break-all;
    }

    .mensaje a:hover,
    .mensaje-text a:hover {
      color: #7000ff !important;
      border-bottom-color: rgba(112, 0, 255, 0.5);
      text-shadow: 0 0 8px rgba(112, 0, 255, 0.4);
    }

    /* TYPING */
    .typing-wrapper {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      animation: slideIn 0.3s ease;
    }

    .typing {
      padding: 14px 20px;
      background: var(--ai-bg);
      border: 1px solid rgba(0, 255, 157, 0.12);
      border-radius: 4px 16px 16px 16px;
      display: flex;
      gap: 5px;
      align-items: center;
    }

    .typing span {
      width: 6px;
      height: 6px;
      background: var(--accent3);
      border-radius: 50%;
      animation: typingBounce 1.4s infinite;
      box-shadow: 0 0 4px var(--accent3);
    }

    .typing span:nth-child(2) { animation-delay: 0.2s; }
    .typing span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes typingBounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-8px); opacity: 1; }
    }

    /* INPUT AREA */
    #inputArea {
      position: relative;
      z-index: 10;
      padding: 16px 24px 20px;
      background: rgba(8, 8, 16, 0.95);
      border-top: 1px solid var(--border);
      backdrop-filter: blur(20px);
    }

    #inputArea::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent2), var(--accent), transparent);
      opacity: 0.3;
    }

    .input-container {
      display: flex;
      gap: 10px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 8px 8px 18px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .input-container:focus-within {
      border-color: rgba(0, 212, 255, 0.3);
      box-shadow: 0 0 20px rgba(0, 212, 255, 0.05), 0 0 40px rgba(112, 0, 255, 0.03);
    }

    #input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.92rem;
      outline: none;
      resize: none;
      min-height: 36px;
      max-height: 120px;
      font-family: 'Inter', sans-serif;
      line-height: 1.6;
      padding: 6px 0;
    }

    #input::placeholder { color: var(--text-dim); }

    #btnEnviar {
      width: 40px;
      height: 40px;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }

    #btnEnviar:hover {
      transform: scale(1.05);
      box-shadow: 0 0 16px rgba(0, 212, 255, 0.3);
    }

    #btnEnviar:active { transform: scale(0.96); }
    #btnEnviar:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

    .input-hint {
      font-size: 0.65rem;
      color: var(--text-dim);
      text-align: center;
      margin-top: 8px;
      letter-spacing: 1px;
    }

    /* Convertir URLs en texto a links clicables */
    .mensaje-text {
      white-space: pre-wrap;
    }

    #btnMic {
      width: 40px;
      height: 40px;
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 10px;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #btnMic:hover { background: rgba(0, 212, 255, 0.15); }
    #btnMic.escuchando {
      background: rgba(255, 50, 50, 0.2);
      border-color: rgba(255, 50, 50, 0.5);
      animation: pulseMic 1s infinite;
    }
    @keyframes pulseMic {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255, 50, 50, 0.3); }
      50% { box-shadow: 0 0 0 8px rgba(255, 50, 50, 0); }
    }

    .btn-descarga {
      margin-top: 8px;
      padding: 8px 16px;
      background: linear-gradient(135deg, #00d4ff22, #7000ff22);
      border: 1px solid rgba(0, 212, 255, 0.4);
      border-radius: 8px;
      color: #00d4ff;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
    }
    .btn-descarga:hover {
      background: linear-gradient(135deg, #00d4ff33, #7000ff33);
      box-shadow: 0 0 12px rgba(0, 212, 255, 0.2);
    }

    /* PANEL LATERAL */
    #panel {
      position: fixed;
      top: 60px;
      right: -340px;
      width: 320px;
      height: calc(100vh - 60px);
      background: rgba(8, 8, 20, 0.98);
      border-left: 1px solid var(--border);
      z-index: 100;
      transition: right 0.3s ease;
      overflow-y: auto;
      padding: 20px;
    }
    #panel.abierto { right: 0; }
    #panel::-webkit-scrollbar { width: 3px; }
    #panel::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

    .panel-titulo {
      font-family: 'Rajdhani', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .panel-cerrar {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 1.2rem;
    }
    .panel-seccion {
      margin-bottom: 24px;
    }
    .panel-seccion-titulo {
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 4px;
    }
    .hecho-item {
      font-size: 0.82rem;
      color: var(--text);
      padding: 6px 10px;
      background: rgba(0, 212, 255, 0.05);
      border-radius: 6px;
      margin-bottom: 4px;
      border-left: 2px solid var(--accent);
    }
    .comando-item {
      font-size: 0.82rem;
      color: var(--text);
      padding: 8px 10px;
      background: rgba(112, 0, 255, 0.08);
      border-radius: 6px;
      margin-bottom: 6px;
      border-left: 2px solid var(--accent2);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .comando-item:hover { background: rgba(112, 0, 255, 0.15); }
    .comando-nombre { font-weight: 600; color: #a78bfa; }
    .comando-eliminar {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
    }
    .comando-eliminar:hover { color: #ff6b6b; }
    .nuevo-comando {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-top: 8px;
    }
    .nuevo-comando input, .nuevo-comando textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.82rem;
      padding: 8px;
      font-family: 'Inter', sans-serif;
      outline: none;
      resize: none;
    }
    .nuevo-comando input:focus, .nuevo-comando textarea:focus {
      border-color: rgba(112, 0, 255, 0.4);
    }
    .btn-guardar-cmd {
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      border-radius: 8px;
      color: white;
      padding: 8px;
      cursor: pointer;
      font-size: 0.82rem;
      font-family: 'Inter', sans-serif;
    }

    #btnPanel {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 0.8rem;
      cursor: pointer;
      color: var(--text);
      transition: all 0.2s;
    }
    #btnPanel:hover { background: rgba(0, 212, 255, 0.15); }

    #btnGTTS {
      background: rgba(0, 255, 157, 0.08);
      border: 1px solid rgba(0, 255, 157, 0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btnGTTS.activo {
      background: rgba(0, 255, 157, 0.15);
      border-color: rgba(0, 255, 157, 0.4);
    }

    #btnTraductor {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btnTraductor.activo {
      background: rgba(0, 212, 255, 0.15);
      border-color: rgba(0, 212, 255, 0.4);
    }

    #btnManoLibres {
      background: rgba(0, 212, 255, 0.08);
      border: 1px solid rgba(0, 212, 255, 0.2);
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }
    #btnManoLibres.activo {
      background: rgba(255, 200, 0, 0.15);
      border-color: rgba(255, 200, 0, 0.5);
      animation: pulseMic 1.5s infinite;
    }

    /* BOTON FLOTANTE MANOS LIBRES */
    #btnFlotante {
      position: fixed;
      bottom: 90px;
      right: 20px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      border: none;
      color: white;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 999;
      box-shadow: 0 4px 20px rgba(0, 212, 255, 0.3);
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    #btnFlotante.visible { display: flex; }
    #btnFlotante.escuchando {
      background: linear-gradient(135deg, #ff4444, #ff8800);
      box-shadow: 0 4px 20px rgba(255, 68, 68, 0.5);
      animation: pulseMic 1s infinite;
    }
    #btnFlotante.hablando {
      background: linear-gradient(135deg, #00ff9d, #00d4ff);
      box-shadow: 0 4px 20px rgba(0, 255, 157, 0.4);
    }
  </style>
</head>
<body>

  <header>
    <div class="logo-container">
      <div class="logo-icon">
        <div class="logo-dot"></div>
      </div>
      <span class="logo-text">AKUZFIRO</span>
    </div>
    <div class="header-right">
      <div class="status-badge">
        <div class="status-dot"></div>
        En línea
      </div>
      <button id="btnGTTS" onclick="toggleGTTS()" title="Voz mejorada (gTTS)">🎙️</button>
      <button id="btnVoz" onclick="toggleVoz()" title="Voz del navegador">🔇</button>
      <button id="btnManoLibres" onclick="toggleManoLibres()" title="Manos libres">👋</button>
      <button id="btnPanel" onclick="togglePanel()">☰ Menú</button>
    </div>
  </header>

  <!-- BOTON FLOTANTE -->
  <button id="btnFlotante" onclick="detenerTodo()" title="Detener manos libres">⏹️</button>

  <!-- PANEL TRADUCTOR -->
  <div id="panelTraductor" style="display:none;position:fixed;top:60px;left:0;right:0;bottom:0;background:rgba(5,5,8,0.97);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:20px;">
    <div style="font-family:'Rajdhani',sans-serif;font-size:1.2rem;letter-spacing:3px;color:var(--accent)">MODO INTÉRPRETE</div>
    <div style="display:flex;gap:12px;align-items:center">
      <select id="idiomaA" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.9rem">
        <option value="es-MX">🇲🇽 Español</option>
        <option value="en-US">🇺🇸 English</option>
        <option value="fr-FR">🇫🇷 Français</option>
        <option value="de-DE">🇩🇪 Deutsch</option>
        <option value="it-IT">🇮🇹 Italiano</option>
        <option value="pt-BR">🇧🇷 Português</option>
        <option value="ja-JP">🇯🇵 日本語</option>
        <option value="zh-CN">🇨🇳 中文</option>
        <option value="ar-SA">🇸🇦 العربية</option>
      </select>
      <span style="color:var(--accent);font-size:1.2rem">⇄</span>
      <select id="idiomaB" style="background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:8px;font-size:0.9rem">
        <option value="en-US">🇺🇸 English</option>
        <option value="es-MX">🇲🇽 Español</option>
        <option value="fr-FR">🇫🇷 Français</option>
        <option value="de-DE">🇩🇪 Deutsch</option>
        <option value="it-IT">🇮🇹 Italiano</option>
        <option value="pt-BR">🇧🇷 Português</option>
        <option value="ja-JP">🇯🇵 日本語</option>
        <option value="zh-CN">🇨🇳 中文</option>
        <option value="ar-SA">🇸🇦 العربية</option>
      </select>
    </div>
    <div style="display:flex;gap:16px">
      <button onclick="hablarYTraducir('A')" id="btnHablaA" style="background:linear-gradient(135deg,var(--accent2),var(--accent));border:none;border-radius:50%;width:80px;height:80px;font-size:1.8rem;cursor:pointer;color:white">🎤</button>
      <button onclick="hablarYTraducir('B')" id="btnHablaB" style="background:linear-gradient(135deg,#ff6b00,#ff0080);border:none;border-radius:50%;width:80px;height:80px;font-size:1.8rem;cursor:pointer;color:white">🎤</button>
    </div>
    <div style="display:flex;gap:16px;font-size:0.75rem;color:var(--text-dim);text-align:center">
      <div style="width:80px">Tú hablas</div>
      <div style="width:80px">Ellos hablan</div>
    </div>
    <div id="textoTraductor" style="max-width:500px;text-align:center;padding:16px;background:var(--surface2);border-radius:12px;border:1px solid var(--border);min-height:60px;color:var(--text);font-size:0.95rem"></div>
    <button onclick="toggleTraductor()" style="background:none;border:1px solid var(--border);color:var(--text-dim);padding:8px 20px;border-radius:8px;cursor:pointer;font-size:0.85rem">✕ Cerrar</button>
  </div>

  <!-- PANEL LATERAL -->
  <div id="panel">    <div class="panel-titulo">
      Akuzfiro
      <button class="panel-cerrar" onclick="togglePanel()">✕</button>
    </div>

    <div class="panel-seccion">
      <div class="panel-seccion-titulo">Herramientas</div>
      <button onclick="toggleTraductor()" style="width:100%;background:rgba(0,212,255,0.08);border:1px solid rgba(0,212,255,0.2);border-radius:8px;color:var(--text);padding:10px;cursor:pointer;font-size:0.85rem;text-align:left;margin-bottom:6px">
        🌐 Modo intérprete (traductor en vivo)
      </button>
    </div>

    <div class="panel-seccion">
      <div class="panel-seccion-titulo">Lo que sé de Gustavo</div>
      <div id="listaHechos"><span style="color:var(--text-dim);font-size:0.8rem">Cargando...</span></div>
    </div>

    <div class="panel-seccion">
      <div class="panel-seccion-titulo">Comandos personalizados</div>
      <div id="listaComandos"></div>
      <div class="nuevo-comando">
        <input id="cmdNombre" placeholder='Nombre del comando (ej: "Modo estudio")' />
        <textarea id="cmdAcciones" rows="2" placeholder='Qué hace (ej: "Pon música de concentración y dime cuánto tiempo llevas estudiando")'></textarea>
        <button class="btn-guardar-cmd" onclick="guardarComando()">+ Guardar comando</button>
      </div>
    </div>

    <div class="panel-seccion">
      <div class="panel-seccion-titulo">Historial reciente</div>
      <div id="listaHistorial"><span style="color:var(--text-dim);font-size:0.8rem">Cargando...</span></div>
    </div>
  </div>

  <div id="chat">
    <div class="bienvenida" id="bienvenida">
      <div class="bienvenida-title">AKUZFIRO</div>
      <div class="bienvenida-line"></div>
      <div class="bienvenida-sub">Asistente personal · Gustavo</div>
    </div>
  </div>

  <div id="inputArea">
    <div class="input-container">
      <textarea id="input" placeholder="Escribe o habla con Akuzfiro..." rows="1"></textarea>
      <button id="btnMic" onclick="toggleMic()" title="Hablar">
        🎤
      </button>
      <button id="btnEnviar" onclick="enviar()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"></line>
          <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter para enviar &nbsp;·&nbsp; Shift+Enter para nueva línea</div>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const btnEl = document.getElementById('btnEnviar');
    const btnVozEl = document.getElementById('btnVoz');
    const btnGTTSEl = document.getElementById('btnGTTS');
    const bienvenida = document.getElementById('bienvenida');

    // --- PANEL LATERAL ---
    let panelAbierto = false;
    function togglePanel() {
      panelAbierto = !panelAbierto;
      document.getElementById('panel').classList.toggle('abierto', panelAbierto);
      if (panelAbierto) {
        cargarPanel();
      }
    }

    async function cargarPanel() {
      // Hechos
      try {
        const res = await fetch('/memoria');
        const data = await res.json();
        const listaHechos = document.getElementById('listaHechos');
        if (data.hechos && data.hechos.length > 0) {
          listaHechos.innerHTML = data.hechos.map(h => `<div class="hecho-item">${h}</div>`).join('');
        } else {
          listaHechos.innerHTML = '<span style="color:var(--text-dim);font-size:0.8rem">Aún no hay hechos guardados</span>';
        }
        // Historial
        const listaHistorial = document.getElementById('listaHistorial');
        if (data.conversaciones && data.conversaciones.length > 0) {
          const ultimas = data.conversaciones.slice(-5).reverse();
          listaHistorial.innerHTML = ultimas.map(c => `
            <div style="margin-bottom:10px;padding:8px;background:rgba(255,255,255,0.03);border-radius:6px;border-left:2px solid var(--border)">
              <div style="font-size:0.75rem;color:var(--accent);margin-bottom:4px">Tú: ${c.usuario.substring(0,60)}${c.usuario.length>60?'...':''}</div>
              <div style="font-size:0.75rem;color:var(--text-dim)">Akuzfiro: ${c.akuzfiro.substring(0,80)}${c.akuzfiro.length>80?'...':''}</div>
            </div>`).join('');
        } else {
          listaHistorial.innerHTML = '<span style="color:var(--text-dim);font-size:0.8rem">Sin historial aún</span>';
        }
      } catch(e) {}
      // Comandos
      cargarComandos();
    }

    async function cargarComandos() {
      try {
        const res = await fetch('/comandos');
        const cmds = await res.json();
        const lista = document.getElementById('listaComandos');
        if (cmds.length > 0) {
          lista.innerHTML = cmds.map(c => `
            <div class="comando-item" onclick="usarComando('${c.nombre}')">
              <div>
                <div class="comando-nombre">${c.nombre}</div>
                <div style="font-size:0.75rem;color:var(--text-dim);margin-top:2px">${c.acciones.substring(0,60)}...</div>
              </div>
              <button class="comando-eliminar" onclick="event.stopPropagation();eliminarComando('${c.nombre}')">✕</button>
            </div>`).join('');
        } else {
          lista.innerHTML = '<div style="color:var(--text-dim);font-size:0.8rem;margin-bottom:8px">Sin comandos aún</div>';
        }
      } catch(e) {}
    }

    async function guardarComando() {
      const nombre = document.getElementById('cmdNombre').value.trim();
      const acciones = document.getElementById('cmdAcciones').value.trim();
      if (!nombre || !acciones) return;
      await fetch('/comandos', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre, acciones })
      });
      document.getElementById('cmdNombre').value = '';
      document.getElementById('cmdAcciones').value = '';
      cargarComandos();
    }

    async function eliminarComando(nombre) {
      await fetch(`/comandos/${encodeURIComponent(nombre)}`, { method: 'DELETE' });
      cargarComandos();
    }

    function usarComando(nombre) {
      inputEl.value = nombre;
      togglePanel();
      enviar();
    }

    // --- gTTS ---
    let gttsActivo = false;
    function toggleGTTS() {
      gttsActivo = !gttsActivo;
      btnGTTSEl.classList.toggle('activo', gttsActivo);
      btnGTTSEl.title = gttsActivo ? 'Voz mejorada ON' : 'Voz mejorada OFF';
      if (gttsActivo && vozActiva) {
        vozActiva = false;
        btnVozEl.textContent = '🔇';
        btnVozEl.classList.remove('activo');
        window.speechSynthesis.cancel();
      }
    }

    async function hablarGTTS(texto) {
      try {
        const res = await fetch('/tts', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ texto })
        });
        if (!res.ok) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const audio = new Audio(url);
        audio.playbackRate = 1.25;  // 25% más rápido
        audio.play();
        audio.onended = () => URL.revokeObjectURL(url);
      } catch(e) {
        console.error('Error gTTS:', e);
      }
    }

    let vozActiva = false;

    function toggleVoz() {
      vozActiva = !vozActiva;
      btnVozEl.textContent = vozActiva ? '🔊' : '🔇';
      btnVozEl.classList.toggle('activo', vozActiva);
      if (!vozActiva) window.speechSynthesis.cancel();
    }

    function hablar(texto) {
      if (!vozActiva) return;
      window.speechSynthesis.cancel();
      // Limpiar URLs y markdown para que suene natural
      let textoLimpio = texto
        .replace(/https?:\/\/\S+/g, '')
        .replace(/\*\*|__|\*|_|`/g, '')
        .replace(/\n+/g, ' ')
        .trim();
      if (!textoLimpio) return;

      const utter = new SpeechSynthesisUtterance(textoLimpio);
      utter.lang = 'es-MX';
      utter.rate = 1.0;
      utter.pitch = 1.0;
      utter.volume = 1.0;

      // Buscar una voz en español
      const voces = window.speechSynthesis.getVoices();
      const vozEsp = voces.find(v => v.lang.startsWith('es')) || voces[0];
      if (vozEsp) utter.voice = vozEsp;

      window.speechSynthesis.speak(utter);
    }

    // --- MANOS LIBRES ---
    let manoLibresActivo = false;
    let reconocimientoContinuo = null;
    let esperandoRespuesta = false;
    const btnManoLibresEl = document.getElementById('btnManoLibres');

    function toggleManoLibres() {
      manoLibresActivo = !manoLibresActivo;
      btnManoLibresEl.classList.toggle('activo', manoLibresActivo);
      btnManoLibresEl.title = manoLibresActivo ? 'Manos libres ON — click para desactivar' : 'Manos libres';

      if (manoLibresActivo) {
        // Activar voz automáticamente
        if (!vozActiva && !gttsActivo) {
          vozActiva = true;
          btnVozEl.textContent = '🔊';
          btnVozEl.classList.add('activo');
        }
        iniciarEscuchaContinua();
        agregarMensaje('Modo manos libres activado. Te escucho. Di "stop" para desactivarme, "espera" o "akuzfiro" mientras hablo para interrumpirme.', 'akuzfiro');
        hablar('Modo manos libres activado. Te escucho.');
      } else {
        detenerEscuchaContinua();
        agregarMensaje('Modo manos libres desactivado.', 'akuzfiro');
      }
    }

    function iniciarEscuchaContinua() {
      // Limpiar reconocimiento anterior si existe
      if (reconocimientoContinuo) {
        try { reconocimientoContinuo.stop(); } catch(e) {}
        reconocimientoContinuo = null;
      }

      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
        manoLibresActivo = false;
        btnManoLibresEl.classList.remove('activo');
        return;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      reconocimientoContinuo = new SR();
      reconocimientoContinuo.lang = 'es-MX';
      reconocimientoContinuo.continuous = false;
      reconocimientoContinuo.interimResults = false;
      reconocimientoContinuo.maxAlternatives = 1;

      reconocimientoContinuo.onresult = async (e) => {
        if (esperandoRespuesta) return;
        const texto = e.results[0][0].transcript.trim();
        const textoLower = texto.toLowerCase();
        console.log('[ML] Estado: Escuchando —', texto);
        if (!texto) return;

        // Comandos de control — palabras clave para detener
        const comandosStop = ['stop', 'para ya', 'modo off', 'apágate', 'apegate', 'salir'];
        if (comandosStop.some(p => textoLower.includes(p))) {
          toggleManoLibres();
          return;
        }

        // Palabras para interrumpir la voz actual
        const interrupciones = ['oye', 'espera', 'un momento', 'hey'];
        if (interrupciones.some(p => textoLower.includes(p))) {
          window.speechSynthesis.cancel();
          esperandoRespuesta = false;
          return;
        }

        esperandoRespuesta = true;
        inputEl.value = texto;
        await enviarManoLibres(texto);
      };

      reconocimientoContinuo.onend = () => {
        // Reiniciar automáticamente si sigue activo
        if (manoLibresActivo && !esperandoRespuesta) {
          setTimeout(() => {
            if (manoLibresActivo && reconocimientoContinuo) {
              try { reconocimientoContinuo.start(); } catch(e) {}
            }
          }, 300);
        }
      };

      reconocimientoContinuo.onerror = (e) => {
        if (e.error === 'no-speech' || e.error === 'audio-capture') {
          // Reintentar silenciosamente
          setTimeout(() => {
            if (manoLibresActivo) {
              try { reconocimientoContinuo.start(); } catch(e) {}
            }
          }, 500);
        }
      };

      try { reconocimientoContinuo.start(); } catch(e) {}
    }

    function detenerEscuchaContinua() {
      manoLibresActivo = false;
      esperandoRespuesta = false;
      if (reconocimientoContinuo) {
        try { reconocimientoContinuo.stop(); } catch(e) {}
        reconocimientoContinuo = null;
      }
      btnManoLibresEl.classList.remove('activo');
    }

    async function enviarManoLibres(mensaje) {
      console.log('[ML] Estado: Procesando mensaje:', mensaje);
      agregarMensaje(mensaje, 'usuario');
      inputEl.value = '';
      btnEl.disabled = true;
      mostrarTyping();

      try {
        console.log('[ML] Estado: Esperando respuesta del backend');
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje })
        });
        const data = await res.json();
        quitarTyping();

        if (data.respuesta) {
          const textoFinal = agregarMensaje(data.respuesta, 'akuzfiro');
          console.log('[ML] Estado: Hablando respuesta');
          if (gttsActivo) {
            await hablarGTTSYEsperar(textoFinal || data.respuesta);
          } else if (vozActiva) {
            await hablarYEsperar(textoFinal || data.respuesta);
          }
          console.log('[ML] Estado: Fin de habla');
        }
      } catch(e) {
        quitarTyping();
        console.log('[ML] Error:', e);
        agregarMensaje('Error de conexión.', 'akuzfiro');
      } finally {
        btnEl.disabled = false;
        esperandoRespuesta = false;
        console.log('[ML] Estado: Reanudando escucha');
        if (manoLibresActivo) {
          setTimeout(() => {
            if (manoLibresActivo) iniciarEscuchaContinua();
          }, 600);
        }
      }
    }

    function hablarYEsperar(texto) {
      return new Promise((resolve) => {
        window.speechSynthesis.cancel();
        let textoLimpio = texto
          .replace(/https?:\/\/\S+/g, '')
          .replace(/\*\*|__|\*|_|`/g, '')
          .replace(/\n+/g, ' ')
          .trim();
        if (!textoLimpio) { resolve(); return; }

        let resuelto = false;
        const resolver = () => { if (!resuelto) { resuelto = true; detenerDeteccionVoz(); resolve(); } };

        const utter = new SpeechSynthesisUtterance(textoLimpio);
        utter.lang = 'es-MX';
        utter.rate = 1.0;
        const voces = window.speechSynthesis.getVoices();
        const vozEsp = voces.find(v => v.lang.startsWith('es')) || voces[0];
        if (vozEsp) utter.voice = vozEsp;
        utter.onend = () => { console.log('[VOZ] fin onend'); resolver(); };
        utter.onerror = () => { console.log('[VOZ] error'); resolver(); };

        const duracion = (textoLimpio.length / 15) * 1000 + 2500;
        const tid = setTimeout(() => { console.log('[VOZ] timeout respaldo'); resolver(); }, duracion);
        const resolverFinal = () => { clearTimeout(tid); resolver(); };
        utter.onend = () => resolverFinal();

        window.speechSynthesis.speak(utter);

        // Activar VAD después de 1.5s: el echo canceller del navegador
        // necesita tiempo para aprender y suprimir el audio del TTS
        if (manoLibresActivo) {
          setTimeout(() => {
            if (!resuelto) iniciarDeteccionVoz(() => {
              console.log('[VAD] Interrupción confirmada — cancelando TTS');
              window.speechSynthesis.cancel();
              resolverFinal();
            });
          }, 1500);
        }
      });
    }

    async function hablarGTTSYEsperar(texto) {
      return new Promise(async (resolve) => {
        let resuelto = false;
        const resolver = () => { if (!resuelto) { resuelto = true; detenerDeteccionVoz(); resolve(); } };
        try {
          const res = await fetch('/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ texto })
          });
          if (!res.ok) { resolver(); return; }
          const blob = await res.blob();
          const url = URL.createObjectURL(blob);
          const audioEl = new Audio(url);
          audioEl.playbackRate = 1.25;

          const duracion = blob.size / 8000 * 1000 + 2000;
          const tid = setTimeout(() => resolver(), duracion);
          audioEl.onended = () => { clearTimeout(tid); URL.revokeObjectURL(url); resolver(); };
          audioEl.onerror = () => { clearTimeout(tid); resolver(); };
          audioEl.play();

          if (manoLibresActivo) {
            setTimeout(() => {
              if (!resuelto) iniciarDeteccionVoz(() => {
                console.log('[VAD] Interrupción confirmada — cancelando gTTS');
                audioEl.pause();
                URL.revokeObjectURL(url);
                resolver();
              });
            }, 1500);
          }
        } catch(e) { resolver(); }
      });
    }

    // ============================================================
    // VAD HÍBRIDO: echoCancellation + energía + palabra de interrupción
    // Arquitectura: navegador filtra el eco del TTS antes de llegar
    // al análisis de energía, eliminando auto-interrupciones falsas.
    // Si VAD detecta energía → escucha corta (1.5s) para confirmar
    // una palabra de interrupción antes de cancelar el TTS.
    // ============================================================
    let vozStream = null;
    let vozContext = null;
    let vozAnalyser = null;
    let vozFrame = null;
    let vozCallback = null;

    // Palabras que confirman que el usuario quiere interrumpir
    const PALABRAS_INTERRUPCION = [
      'akuzfiro', 'espera', 'alto', 'detente', 'detén', 'para',
      'oye', 'hey', 'un momento', 'stop'
    ];

    /**
     * Solicita micrófono con echo cancellation activado.
     * Esto hace que el navegador suprima el audio del TTS antes
     * de que llegue al analizador, evitando falsas detecciones.
     */
    function pedirMicConEcho() {
      return navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        },
        video: false
      });
    }

    /**
     * Inicia la detección de voz durante la reproducción del TTS.
     * Flujo:
     *   1. Abre micrófono con echo cancellation
     *   2. Analiza energía en frecuencias de voz humana (300-3400 Hz)
     *   3. Si detecta energía sostenida (>=4 frames), lanza escucha
     *      rápida de SpeechRecognition por 1.5s
     *   4. Solo cancela el TTS si se reconoce una palabra de interrupción
     */
    function iniciarDeteccionVoz(onVozDetectada) {
      detenerDeteccionVoz();
      vozCallback = onVozDetectada;

      pedirMicConEcho()
        .then(stream => {
          vozStream = stream;
          vozContext = new (window.AudioContext || window.webkitAudioContext)();
          const source = vozContext.createMediaStreamSource(stream);
          vozAnalyser = vozContext.createAnalyser();
          vozAnalyser.fftSize = 512;
          source.connect(vozAnalyser);

          const buf = new Uint8Array(vozAnalyser.frequencyBinCount);
          let framesVoz = 0;
          let esperandoConfirmacion = false;

          function loop() {
            if (!vozAnalyser) return;
            vozAnalyser.getByteFrequencyData(buf);

            // Rango de voz humana: 300 Hz – 3400 Hz
            const binHz = vozContext.sampleRate / vozAnalyser.fftSize;
            const inicio = Math.floor(300 / binHz);
            const fin    = Math.floor(3400 / binHz);
            let suma = 0;
            for (let i = inicio; i < fin && i < buf.length; i++) suma += buf[i];
            const energia = suma / (fin - inicio);

            // Umbral ligeramente más alto para tolerar ruido residual
            if (energia > 32) {
              framesVoz++;
              if (framesVoz >= 4 && !esperandoConfirmacion) {
                esperandoConfirmacion = true;
                // Lanzar escucha corta para confirmar palabra de interrupción
                confirmarInterrupcion(() => {
                  // Confirmado: el usuario quiere interrumpir
                  detenerDeteccionVoz();
                  if (vozCallback) vozCallback();
                }, () => {
                  // No confirmado: reiniciar contador y seguir escuchando
                  framesVoz = 0;
                  esperandoConfirmacion = false;
                  if (vozFrame !== null) vozFrame = requestAnimationFrame(loop);
                });
                return; // Pausa el loop mientras SpeechRecognition escucha
              }
            } else {
              framesVoz = Math.max(0, framesVoz - 1); // decaimiento suave
            }

            vozFrame = requestAnimationFrame(loop);
          }

          vozFrame = requestAnimationFrame(loop);
        })
        .catch(() => {
          // Fallback sin echo cancellation si el navegador lo rechaza
          navigator.mediaDevices.getUserMedia({ audio: true, video: false })
            .then(stream => {
              vozStream = stream;
              // Re-invocar con el stream básico (sin confirmación de palabra)
              vozContext = new (window.AudioContext || window.webkitAudioContext)();
              const source = vozContext.createMediaStreamSource(stream);
              vozAnalyser = vozContext.createAnalyser();
              vozAnalyser.fftSize = 256;
              source.connect(vozAnalyser);
              const buf = new Uint8Array(vozAnalyser.frequencyBinCount);
              let frames = 0;
              function loopFallback() {
                if (!vozAnalyser) return;
                vozAnalyser.getByteFrequencyData(buf);
                const inicio = Math.floor(300 / (vozContext.sampleRate / vozAnalyser.fftSize));
                const fin    = Math.floor(3000 / (vozContext.sampleRate / vozAnalyser.fftSize));
                let suma = 0;
                for (let i = inicio; i < fin && i < buf.length; i++) suma += buf[i];
                const promedio = suma / (fin - inicio);
                if (promedio > 25) {
                  frames++;
                  if (frames >= 3) {
                    detenerDeteccionVoz();
                    if (vozCallback) vozCallback();
                    return;
                  }
                } else { frames = 0; }
                vozFrame = requestAnimationFrame(loopFallback);
              }
              vozFrame = requestAnimationFrame(loopFallback);
            })
            .catch(() => {});
        });
    }

    /**
     * Escucha durante ~1.5 segundos para verificar si el usuario dijo
     * una palabra de interrupción.  
     * - onConfirmado: se llama si se detectó la palabra  
     * - onNoConfirmado: se llama si no hubo coincidencia o timeout
     */
    function confirmarInterrupcion(onConfirmado, onNoConfirmado) {
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        // Sin SR disponible: confirmar directo (comportamiento antiguo)
        onConfirmado();
        return;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const rec = new SR();
      rec.lang = 'es-MX';
      rec.continuous = false;
      rec.interimResults = false;
      rec.maxAlternatives = 3;

      let terminado = false;

      const timeout = setTimeout(() => {
        if (!terminado) {
          terminado = true;
          try { rec.stop(); } catch(e) {}
          onNoConfirmado();
        }
      }, 1800); // 1.8 segundos máximo de espera

      rec.onresult = (e) => {
        if (terminado) return;
        clearTimeout(timeout);
        terminado = true;

        // Revisar todas las alternativas reconocidas
        let textoReconocido = '';
        for (let i = 0; i < e.results[0].length; i++) {
          textoReconocido += ' ' + e.results[0][i].transcript.toLowerCase();
        }
        console.log('[VAD] Confirmación escuchada:', textoReconocido.trim());

        const esInterrupcion = PALABRAS_INTERRUPCION.some(p => textoReconocido.includes(p));
        if (esInterrupcion) {
          onConfirmado();
        } else {
          onNoConfirmado();
        }
      };

      rec.onerror = () => {
        if (!terminado) {
          clearTimeout(timeout);
          terminado = true;
          onNoConfirmado();
        }
      };

      rec.onend = () => {
        if (!terminado) {
          clearTimeout(timeout);
          terminado = true;
          onNoConfirmado();
        }
      };

      try { rec.start(); } catch(e) { onNoConfirmado(); }
    }

    function detenerDeteccionVoz() {
      vozCallback = null;
      if (vozFrame) { cancelAnimationFrame(vozFrame); vozFrame = null; }
      if (vozAnalyser) { try { vozAnalyser.disconnect(); } catch(e) {} vozAnalyser = null; }
      if (vozContext) { try { vozContext.close(); } catch(e) {} vozContext = null; }
      if (vozStream) { vozStream.getTracks().forEach(t => t.stop()); vozStream = null; }
    }

    function interrumpirVoz() {
      window.speechSynthesis.cancel();
      detenerDeteccionVoz();
    }

    function iniciarBargeIn() {}

    function detenerBargeIn() {
      if (typeof bargeInRec !== 'undefined' && bargeInRec) {
        try { bargeInRec.stop(); } catch(e) {}
        bargeInRec = null;
      }
    }
    let reconocimiento = null;
    let micActivo = false;
    const btnMicEl = document.getElementById('btnMic');

    function toggleMic() {
      // Si está en manos libres y Akuzfiro está hablando, interrumpe
      if (manoLibresActivo && (window._resolveVoz || window._audioActual)) {
        interrumpirVoz();
        return;
      }
      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        alert('Tu navegador no soporta reconocimiento de voz. Usa Chrome.');
        return;
      }
      if (micActivo) {
        detenerMic();
      } else {
        iniciarMic();
      }
    }

    function iniciarMic() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      reconocimiento = new SR();
      reconocimiento.lang = 'es-MX';
      reconocimiento.interimResults = false;
      reconocimiento.maxAlternatives = 1;

      reconocimiento.onstart = () => {
        micActivo = true;
        btnMicEl.textContent = '⏹️';
        btnMicEl.classList.add('escuchando');
        window.speechSynthesis.cancel(); // Para la voz si está hablando
      };

      reconocimiento.onresult = (e) => {
        const texto = e.results[0][0].transcript;
        inputEl.value = texto;
        detenerMic();
        enviar();
      };

      reconocimiento.onerror = (e) => {
        console.error('Error micrófono:', e.error);
        detenerMic();
      };

      reconocimiento.onend = () => {
        detenerMic();
      };

      reconocimiento.start();
    }

    function detenerMic() {
      micActivo = false;
      btnMicEl.textContent = '🎤';
      btnMicEl.classList.remove('escuchando');
      if (reconocimiento) {
        try { reconocimiento.stop(); } catch(e) {}
        reconocimiento = null;
      }
    }

    // Cargar voces (necesario en algunos navegadores)
    window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();

    // --- MODO TRADUCTOR ---
    let traductorActivo = false;

    function toggleTraductor() {
      traductorActivo = !traductorActivo;
      const panel = document.getElementById('panelTraductor');
      panel.style.display = traductorActivo ? 'flex' : 'none';
    }

    function hablarYTraducir(quien) {
      const idiomaOrigen = quien === 'A'
        ? document.getElementById('idiomaA').value
        : document.getElementById('idiomaB').value;
      const idiomaDestino = quien === 'A'
        ? document.getElementById('idiomaB').value
        : document.getElementById('idiomaA').value;

      const btnId = quien === 'A' ? 'btnHablaA' : 'btnHablaB';
      const btn = document.getElementById(btnId);
      const textoEl = document.getElementById('textoTraductor');

      if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
        textoEl.textContent = 'Tu navegador no soporta reconocimiento de voz. Usa Chrome.';
        return;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      const rec = new SR();
      rec.lang = idiomaOrigen;
      rec.interimResults = false;
      rec.maxAlternatives = 1;

      btn.textContent = '⏺️';
      btn.style.animation = 'pulseMic 1s infinite';
      textoEl.textContent = 'Escuchando...';

      rec.onresult = async (e) => {
        const textoOriginal = e.results[0][0].transcript;
        btn.textContent = '🎤';
        btn.style.animation = '';
        textoEl.textContent = `"${textoOriginal}" → traduciendo...`;

        // Pedir traducción a Akuzfiro
        const nombreIdioma = {
          'es-MX': 'español', 'en-US': 'inglés', 'fr-FR': 'francés',
          'de-DE': 'alemán', 'it-IT': 'italiano', 'pt-BR': 'portugués',
          'ja-JP': 'japonés', 'zh-CN': 'chino mandarín', 'ar-SA': 'árabe'
        };
        const destNombre = nombreIdioma[idiomaDestino] || idiomaDestino;
        const mensaje = `Traduce exactamente al ${destNombre}, sin explicaciones ni notas, solo la traducción: "${textoOriginal}"`;

        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ mensaje })
          });
          const data = await res.json();
          if (data.respuesta) {
            const traduccion = data.respuesta.trim();
            textoEl.innerHTML = `<span style="color:var(--text-dim)">${textoOriginal}</span><br><span style="color:var(--accent);font-size:1.1rem">${traduccion}</span>`;

            // Hablar la traducción en el idioma destino
            window.speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(traduccion);
            utter.lang = idiomaDestino;
            window.speechSynthesis.speak(utter);
          }
        } catch(e) {
          textoEl.textContent = 'Error de conexión';
        }
      };

      rec.onerror = () => {
        btn.textContent = '🎤';
        btn.style.animation = '';
        textoEl.textContent = 'Error al escuchar. Intenta de nuevo.';
      };

      rec.start();
    }
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js')
        .then(() => console.log('[PWA] Service Worker registrado'))
        .catch(e => console.log('[PWA] Error:', e));
    }

    inputEl.addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = Math.min(this.scrollHeight, 120) + 'px';
    });

    inputEl.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        enviar();
      }
    });

    function procesarRespuesta(texto) {
      const regexExcel = /\[ARCHIVO_EXCEL\]([\s\S]*?)\[\/ARCHIVO_EXCEL\]/;
      const regexPDF = /\[ARCHIVO_PDF\]([\s\S]*?)\[\/ARCHIVO_PDF\]/;
      const regexWord = /\[ARCHIVO_WORD\]([\s\S]*?)\[\/ARCHIVO_WORD\]/;
      const regexPPTX = /\[ARCHIVO_PPTX\]([\s\S]*?)\[\/ARCHIVO_PPTX\]/;

      let textoLimpio = texto;
      let archivoData = null;
      let tipoArchivo = null;

      const matchExcel = texto.match(regexExcel);
      const matchPDF = texto.match(regexPDF);
      const matchWord = texto.match(regexWord);
      const matchPPTX = texto.match(regexPPTX);

      if (matchExcel) {
        try { archivoData = JSON.parse(matchExcel[1]); tipoArchivo = 'excel'; textoLimpio = texto.replace(regexExcel, '').trim(); } catch(e) {}
      } else if (matchPDF) {
        try { archivoData = JSON.parse(matchPDF[1]); tipoArchivo = 'pdf'; textoLimpio = texto.replace(regexPDF, '').trim(); } catch(e) {}
      } else if (matchWord) {
        try { archivoData = JSON.parse(matchWord[1]); tipoArchivo = 'word'; textoLimpio = texto.replace(regexWord, '').trim(); } catch(e) {}
      } else if (matchPPTX) {
        try { archivoData = JSON.parse(matchPPTX[1]); tipoArchivo = 'pptx'; textoLimpio = texto.replace(regexPPTX, '').trim(); } catch(e) {}
      }

      return { textoLimpio, archivoData, tipoArchivo };
    }

    async function descargarArchivo(tipo, datos) {
      const endpoints = { excel: '/generar-excel', pdf: '/generar-pdf', word: '/generar-word', pptx: '/generar-pptx' };
      const extensiones = { excel: '.xlsx', pdf: '.pdf', word: '.docx', pptx: '.pptx' };
      try {
        const res = await fetch(endpoints[tipo], {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(datos)
        });
        if (!res.ok) throw new Error('Error generando archivo');
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = datos.titulo + extensiones[tipo];
        a.click();
        URL.revokeObjectURL(url);
      } catch(e) {
        alert('Error descargando el archivo: ' + e.message);
      }
    }

    function agregarBtnDescarga(wrapper, tipo, datos) {
      const iconos = { excel: '📊', pdf: '📄', word: '📝', pptx: '📊' };
      const nombres = { excel: 'Excel', pdf: 'PDF', word: 'Word', pptx: 'PowerPoint' };
      const btn = document.createElement('button');
      btn.className = 'btn-descarga';
      btn.innerHTML = `${iconos[tipo]} Descargar ${nombres[tipo]}`;
      btn.onclick = () => descargarArchivo(tipo, datos);
      wrapper.appendChild(btn);
    }

    function linkifyText(text) {
      const urlRegex = /(https?:\/\/[^\s\)\]\,\"\']+)/g;
      const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return escaped.replace(urlRegex, url => `<a href="${url}" target="_blank" rel="noopener">${url}</a>`);
    }

    function agregarMensaje(texto, tipo) {
      if (bienvenida) bienvenida.style.display = 'none';

      const wrapper = document.createElement('div');
      wrapper.className = `mensaje-wrapper ${tipo}`;

      const label = document.createElement('div');
      label.className = 'mensaje-label';
      label.textContent = tipo === 'usuario' ? 'TÚ' : 'AKUZFIRO';

      const burbuja = document.createElement('div');
      burbuja.className = `mensaje ${tipo}`;

      const contenido = document.createElement('div');
      contenido.className = 'mensaje-text';

      let textoFinal = texto;
      let archivoData = null;
      let tipoArchivo = null;

      if (tipo === 'akuzfiro') {
        const resultado = procesarRespuesta(texto);
        textoFinal = resultado.textoLimpio;
        archivoData = resultado.archivoData;
        tipoArchivo = resultado.tipoArchivo;
      }

      contenido.innerHTML = linkifyText(textoFinal);
      burbuja.appendChild(contenido);
      wrapper.appendChild(label);
      wrapper.appendChild(burbuja);

      if (archivoData && tipoArchivo) {
        agregarBtnDescarga(wrapper, tipoArchivo, archivoData);
      }

      chatEl.appendChild(wrapper);
      chatEl.scrollTop = chatEl.scrollHeight;
      return textoFinal || texto;
    }

    function mostrarTyping() {
      const wrapper = document.createElement('div');
      wrapper.className = 'typing-wrapper';
      wrapper.id = 'typing';
      const typing = document.createElement('div');
      typing.className = 'typing';
      typing.innerHTML = '<span></span><span></span><span></span>';
      wrapper.appendChild(typing);
      chatEl.appendChild(wrapper);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function quitarTyping() {
      const t = document.getElementById('typing');
      if (t) t.remove();
    }

    async function enviar() {
      const mensaje = inputEl.value.trim();
      if (!mensaje) return;

      agregarMensaje(mensaje, 'usuario');
      inputEl.value = '';
      inputEl.style.height = 'auto';
      btnEl.disabled = true;
      mostrarTyping();

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mensaje })
        });

        const data = await res.json();
        quitarTyping();

        if (data.respuesta) {
          const textoFinal = agregarMensaje(data.respuesta, 'akuzfiro');
          if (gttsActivo) {
            hablarGTTS(textoFinal || data.respuesta);
          } else if (vozActiva) {
            hablar(textoFinal || data.respuesta);
          }
        } else {
          agregarMensaje('Error: ' + (data.error || 'desconocido'), 'akuzfiro');
        }
      } catch (err) {
        quitarTyping();
        agregarMensaje('No puedo conectarme al servidor.', 'akuzfiro');
      }

      btnEl.disabled = false;
      inputEl.focus();
    }
  </script>
